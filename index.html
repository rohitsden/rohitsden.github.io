<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rohit Menon</title>
    <meta name="description" content="Rohit Menon — connect on LinkedIn, Substack, or GitHub.">
    <meta name="author" content="Rohit Menon">

    <meta property="og:title" content="Rohit Menon">
    <meta property="og:description" content="Connect with Rohit Menon.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.rohitmenon.com/">
    <meta property="og:image" content="https://www.rohitmenon.com/images/rohitmenon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon/favicon-16x16.png">
    <link rel="manifest" href="./images/favicon/site.webmanifest">

    <style>
        :root {
            --bg: #f8f6f1;
            --card: #fffdf8;
            --ink: #1f1c18;
            --muted: #6f6860;
            --line: #e2d9cb;
            --link: #245f87;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        main {
            width: min(100%, 860px);
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: clamp(28px, 6vw, 64px);
            align-items: center;
            padding: clamp(28px, 6vw, 56px);
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
        }

        img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid #f1eadf;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 6vw, 4rem);
            line-height: 1;
            letter-spacing: -0.055em;
        }

        p {
            max-width: 520px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
        }

        a {
            color: var(--link);
            font-weight: 700;
            text-decoration: none;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #ffffff;
        }

        a:hover { text-decoration: underline; }

        @media (max-width: 720px) {
            main {
                grid-template-columns: 1fr;
                text-align: center;
            }

            img {
                width: 180px;
                height: 180px;
                margin: 0 auto;
            }

            p { margin-left: auto; margin-right: auto; }
            .links { justify-content: center; }
        }
    </style>
</head>

<body>
    <main>
        <img src="./images/rohitmenon.png" alt="Rohit Menon">
        <section aria-label="Connect with Rohit Menon">
            <h1>Rohit Menon</h1>
            <p>Customer Success and Support leader. Based in Cary, NC.</p>
            <div class="links">
                <a href="https://www.linkedin.com/in/rohit-menon-61b80521/" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://themanagersprism.substack.com/" target="_blank" rel="noopener">Substack</a>
                <a href="https://github.com/rohitsden" target="_blank" rel="noopener">GitHub</a>
            </div>
        </section>
    </main>
</body>

</html>
